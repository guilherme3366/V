<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CBF966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A3D93F;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" />
      <feOffset dx="0" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#grad)" />
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" fill="white" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="18" filter="url(#shadow)">V</text>
</svg>
